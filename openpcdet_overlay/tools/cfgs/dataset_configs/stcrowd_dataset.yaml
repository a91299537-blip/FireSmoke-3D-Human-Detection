DATASET: 'KittiDataset'
DATA_PATH: '../data/stcrowd'
CLASS_NAMES: ['Pedestrian']
POINT_CLOUD_RANGE: [-51.2, -51.2, -3, 51.2, 51.2, 1]

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': [stcrowd_infos_train.pkl],
    'test': [stcrowd_infos_val.pkl],
}

GET_ITEM_LIST: ["points"]
FOV_POINTS_ONLY: False

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['placeholder']
    AUG_CONFIG_LIST:
        - NAME: gt_sampling
          USE_ROAD_PLANE: False
          DB_INFO_PATH:
              - stcrowd_dbinfos_train.pkl
          PREPARE: {
             filter_by_min_points: [ 'Pedestrian:20'],
             filter_by_difficulty: [-1],
          }

          SAMPLE_GROUPS: ['Pedestrian:10']
          NUM_POINT_FEATURES: 4
          DATABASE_WITH_FAKELIDAR: False
          REMOVE_EXTRA_WIDTH: [0.0, 0.0, 0.0]
          LIMIT_WHOLE_SCENE: True

        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.78539816, 0.78539816]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.90, 1.10]

        # Training-only fire-smoke degradation. Raw point clouds and validation
        # samples remain unchanged.
        - NAME: smoke_scene_degradation
          PROB: 0.85
          ECHO_DROPOUT:
              ENABLED: True
              DROP_RATE: [0.08, 0.22]
              RANGE_WEIGHT: 0.35
              LOW_INTENSITY_WEIGHT: 0.20
              MAX_DROP_PROB: 0.65
              MIN_REMAIN_POINTS: 1024
          CENTER_HOLE:
              ENABLED: True
              PROB: 0.65
              RADIUS_RATIO: [0.18, 0.38]
              MIN_BOX_POINTS: 8
              MIN_REMAIN_POINTS: 4
          SMOKE_PSEUDO_POINTS:
              ENABLED: True
              RATIO: [0.04, 0.12]
              RADIAL_SCALE: [0.35, 0.95]
              XYZ_JITTER_STD: [0.03, 0.03, 0.02]
              INTENSITY_SCALE: [0.05, 0.30]
              MAX_POINTS: 12000


POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}


DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': False
      }

    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.025, 0.025, 0.1]
      MAX_POINTS_PER_VOXEL: 5
      MAX_NUMBER_OF_VOXELS: {
        'train': 120000,
        'test': 100000
      }
